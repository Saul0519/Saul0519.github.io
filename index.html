<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열처리기능사 실전 CBT</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --correct-bg: #f0fdf4;
            --correct-border: #22c55e;
            --wrong-bg: #fef2f2;
            --wrong-border: #ef4444;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .card { background: var(--card-bg); border-radius: 8px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        #setup-screen { text-align: center; }
        .input-group { margin: 30px 0; }
        .input-group input { width: 120px; padding: 10px; font-size: 1.1rem; text-align: center; border: 1px solid var(--border); border-radius: 4px; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 4px; cursor: pointer; width: 100%; max-width: 250px; transition: 0.2s; }
        .btn:hover { background-color: var(--primary-hover); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .question-block { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
        .question-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 15px; display: flex; gap: 8px; }
        .q-type { font-size: 0.8rem; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; color: #475569; }
        .options-list { list-style: none; padding: 0; }
        .option-item { display: flex; align-items: center; padding: 10px 15px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
        .option-item.selected { border-color: var(--primary); background-color: #f0fdf4; }
        .saq-input { width: 100%; max-width: 400px; padding: 12px; font-size: 1rem; border: 1px solid var(--border); border-radius: 4px; outline: none; }
        .score-board { text-align: center; padding: 30px 20px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 30px; }
        .option-item.correct-answer { background-color: var(--correct-bg); border-color: var(--correct-border); }
        .option-item.wrong-answer { background-color: var(--wrong-bg); border-color: var(--wrong-border); }
        .saq-result { padding: 15px; border-radius: 4px; margin-top: 10px; }
        .saq-correct { background-color: var(--correct-bg); border: 1px solid var(--correct-border); }
        .saq-wrong { background-color: var(--wrong-bg); border: 1px solid var(--wrong-border); }
        .ai-reasoning-box { margin-top: 8px; padding: 10px; background-color: #f1f5f9; border-left: 4px solid #94a3b8; font-size: 0.85rem; color: #475569;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>열처리기능사 실전 모의고사</h1>
        <p>자동 채점 시스템</p>
    </header>

    <div id="setup-screen" class="card">
        <div class="input-group">
            <label for="num-questions">출제 문항 수 (최대 100)</label><br>
            <input type="number" id="num-questions" value="10" min="1" max="100">
        </div>
        <button class="btn" onclick="startQuiz()">응시하기</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="questions-container" class="card"></div>
        <div style="text-align:center;">
            <button id="submit-btn" class="btn" onclick="submitQuiz()">제출 및 채점</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="score-board">
            <h2><span id="final-score">0</span>점</h2>
            <p>총 <span id="total-q-count">0</span>문제 중 <span id="correct-q-count">0</span>문제를 맞췄습니다.</p>
        </div>
        <div id="review-container" class="card"></div>
        <button class="btn" onclick="location.reload()" style="display:block; margin: 0 auto;">다시 풀기</button>
    </div>
</div>

    let currentQuestions = [];

    function normalizeString(str) {
        return str.toLowerCase().replace(/[\s\(\)\+,\.\-%\℃\/\:\·]/g, '');
    }

    function checkAnswerOffline(correct, user) {
        if (!user) return false;
        
        let c = normalizeString(correct);
        let u = normalizeString(user);
        
        if (c === u || c.includes(u) || u.includes(c)) return true;

        for (let group of massiveDictionary) {
            let isCorrectInGroup = group.some(w => c.includes(normalizeString(w)));
            if (isCorrectInGroup) {
                let isUserMatch = group.some(w => {
                    let nw = normalizeString(w);
                    if(nw.length <= 2 && /^[a-z0-9]+$/.test(nw)) {
                        return u === nw;
                    } else {
                        return u.includes(nw);
                    }
                });
                if (isUserMatch) return true;
            }
        }
        return false;
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getDistractors(correctAnswer) {
        const allAnswers = rawData.map(d => d.a);
        const uniqueAnswers = [...new Set(allAnswers)]; 
        const wrongAnswers = uniqueAnswers.filter(a => a !== correctAnswer);
        return shuffleArray(wrongAnswers).slice(0, 3);
    }

    function startQuiz() {
        const num = parseInt(document.getElementById('num-questions').value) || 10;
        const selected = shuffleArray(rawData).slice(0, Math.min(num, 100));
        currentQuestions = [];
        userAnswers = {};

        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        selected.forEach((item, index) => {
            const isSAQ = Math.random() < 0.3;
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            let html = `<div class="question-title"><span class="q-number">Q${index + 1}.</span> <span>${item.q}</span> <span class="q-type">${isSAQ ? '주관식' : '객관식'}</span></div>`;

            if (isSAQ) {
                currentQuestions.push({ type: 'saq', question: item.q, answer: item.a });
                html += `<input type="text" class="saq-input" oninput="userAnswers[${index}] = this.value" placeholder="정답을 입력하세요">`;
            } else {
                const options = shuffleArray([item.a, ...getDistractors(item.a)]);
                currentQuestions.push({ type: 'mcq', question: item.q, options, correct: options.indexOf(item.a), answer: item.a });
                
                // 💡 해결 완료: id를 부여하여 해당 문제의 보기들만 선택을 해제하도록 수정했습니다.
                html += `<ul class="options-list" id="options-list-${index}">` + options.map((o, oi) => `<li class="option-item" onclick="userAnswers[${index}]=${oi}; document.querySelectorAll('#options-list-${index} .option-item').forEach(e=>e.classList.remove('selected')); this.classList.add('selected');">${o}</li>`).join('') + `</ul>`;
            }
            qBlock.innerHTML = html;
            container.appendChild(qBlock);
        });

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
    }

    function submitQuiz() {
        if (Object.keys(userAnswers).length < currentQuestions.length) {
            if (!confirm('입력하지 않은 문항이 있습니다. 제출하시겠습니까?')) return;
        }

        let correctCount = 0;
        const review = document.getElementById('review-container');
        review.innerHTML = '';

        currentQuestions.forEach((q, i) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            let isCorrect = false;
            let resultHtml = `<div class="question-title"><span class="q-number">Q${i+1}.</span> ${q.question}</div>`;

            if (q.type === 'mcq') {
                isCorrect = userAnswers[i] === q.correct;
                resultHtml += `<ul class="options-list">` + q.options.map((o, oi) => `<li class="option-item ${oi === q.correct ? 'correct-answer' : (oi === userAnswers[i] ? 'wrong-answer' : '')}">${o}</li>`).join('') + `</ul>`;
            } else {
                isCorrect = checkAnswerOffline(q.answer, userAnswers[i]);
                resultHtml += `<div class="saq-result ${isCorrect ? 'saq-correct' : 'saq-wrong'}">
                    <div>작성한 답: <strong>${userAnswers[i] || '(미입력)'}</strong></div>
                    ${!isCorrect ? `<div style="margin-top:5px;">정답: <strong>${q.answer}</strong></div>` : ''}
                </div>
                <div class="ai-reasoning-box">💡 자체 사전 데이터를 기준으로 채점되었습니다.</div>`;
            }
            if (isCorrect) correctCount++;
            
            resultHtml += `<div class="feedback-msg ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                ${isCorrect ? '정답입니다.' : '오답입니다.'}
            </div>`;

            block.innerHTML = resultHtml;
            review.appendChild(block);
        });

        document.getElementById('final-score').innerText = Math.round((correctCount / currentQuestions.length) * 100);
        document.getElementById('total-q-count').innerText = currentQuestions.length;
        document.getElementById('correct-q-count').innerText = correctCount;
        
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
