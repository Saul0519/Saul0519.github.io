<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열처리기능사 개념 이론 CBT</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --toss-blue: #0050FF;
            --toss-gray-50: #F9FAFB;
            --toss-gray-100: #F2F4F6;
            --toss-gray-200: #E5E8EB;
            --toss-gray-600: #4E5968;
            --toss-gray-900: #191F28;
            --white: #FFFFFF;
            --red: #F04452;
            --green: #31C164;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--toss-gray-50);
            color: var(--toss-gray-900);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 48px;
            text-align: left;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 15px;
            color: var(--toss-gray-600);
            margin: 0;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 14px;
            color: var(--toss-gray-600);
            margin-bottom: 12px;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            border: 1px solid var(--toss-gray-200);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--toss-blue);
        }

        .btn {
            width: 100%;
            background-color: var(--toss-blue);
            color: var(--white);
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-outline {
            background-color: var(--toss-gray-100);
            color: var(--toss-gray-600);
            margin-top: 12px;
        }

        .question-block {
            margin-bottom: 40px;
        }

        .question-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 24px;
            word-break: keep-all;
        }

        .q-type {
            font-size: 12px;
            color: var(--toss-blue);
            background: rgba(0, 80, 255, 0.08);
            padding: 4px 8px;
            border-radius: 6px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 1px solid var(--toss-gray-200);
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            color: var(--toss-gray-600);
        }

        .option-item:hover {
            background-color: var(--toss-gray-50);
        }

        .option-item.selected {
            border-color: var(--toss-blue);
            background-color: rgba(0, 80, 255, 0.02);
            color: var(--toss-blue);
            font-weight: 600;
        }

        .saq-input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid var(--toss-gray-200);
            border-radius: 14px;
            outline: none;
        }

        /* 결과 화면 디자인 */
        .score-board {
            text-align: center;
            padding: 40px 0;
        }

        .score-board h2 {
            font-size: 48px;
            margin: 0;
            color: var(--toss-blue);
        }

        .score-board p {
            font-size: 17px;
            color: var(--toss-gray-600);
            margin-top: 8px;
        }

        .result-tag {
            display: inline-block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .correct-answer {
            border-color: var(--green) !important;
            color: var(--green) !important;
            background-color: rgba(49, 193, 100, 0.05);
        }

        .wrong-answer {
            border-color: var(--red) !important;
            color: var(--red) !important;
            background-color: rgba(240, 68, 82, 0.05);
        }

        .saq-result {
            padding: 20px;
            border-radius: 14px;
            margin-top: 12px;
            font-size: 15px;
            border: 1px solid var(--toss-gray-200);
        }

        .feedback-msg {
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>열처리기능사 개념이론 모의고사</h1>
        <p>"이거만 외워도 30개는 넘김" 100제</p>
    </header>

    <div id="setup-screen" class="card">
        <div class="input-group">
            <span class="label">출제 문항 수 설정 (1~100)</span>
            <input type="number" id="num-questions" value="10" min="1" max="100">
        </div>
        <button class="btn" onclick="startQuiz()">응시 시작</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="questions-container" class="card"></div>
        <button class="btn" onclick="submitQuiz()">답안 제출</button>
    </div>

    <div id="result-screen" class="hidden">
        <div class="card score-board">
            <h2><span id="final-score">0</span>점</h2>
            <p>총 <span id="total-q-count">0</span>문항 중 <span id="correct-q-count">0</span>문항 정답</p>
        </div>
        <div id="review-container"></div>
        <button class="btn" onclick="location.reload()">다시 응시</button>
    </div>
</div>

<script>
    const rawData = [
        { q: "황동의 합금 조성은?", a: "구리+아연", d: ["구리+주석", "구리+니켈", "구리+망간", "구리+규소", "아연+주석", "구리+납", "알루미늄+구리"] },
        { q: "제1각법과 제3각법에 도면의 위치가 일치하는 것은?", a: "정면도와 배면도", d: ["정면도와 평면도", "평면도와 저면도", "좌측면도와 우측면도", "정면도와 저면도", "평면도와 측면도"] },
        { q: "상경질 자성 재료의 대표적인 예는?", a: "Nd(네오디뮴) 자석", d: ["규소강판", "퍼멀로이", "순철", "페라이트", "알니코 자석", "센더스트", "뮤메탈"] },
        { q: "침탄 담금질에서 경도가 부족한 원인은?", a: "담금질 냉각 속도가 느릴 때", d: ["침탄 온도가 너무 높을 때", "냉각제가 물일 때", "탄소 농도가 너무 높을 때", "템퍼링 온도가 낮을 때", "유지 시간이 길 때"] },
        { q: "오스테나이트화 온도에서 수랭 담금질한 후 탄소강의 조직은?", a: "마텐자이트", d: ["펄라이트", "베이나이트", "소르바이트", "트루스타이트", "페라이트", "시멘타이트", "레데부라이트"] },
        { q: "미터 보통 나사를 나타내는 기호는?", a: "M", d: ["W", "Tr", "G", "R", "S", "UNC", "PT"] },
        { q: "베어링용 합금이 갖추어야 할 조건은?", a: "마찰계수가 작아야 한다", d: ["열전도율이 작아야 한다", "경도가 매우 낮아야 한다", "마찰계수가 커야 한다", "부식성이 있어야 한다", "융점이 낮아야 한다"] },
        { q: "강자성을 잃고 상자성으로 변화하는 현상은?", a: "자기 변태", d: ["동소 변태", "공정 변태", "공석 변태", "포정 변태", "마텐자이트 변태", "전위", "공공"] },
        { q: "내화재의 구비 조건 중 올바른 것은?", a: "열전도도가 작아야 한다", d: ["열팽창계수가 커야 한다", "열전도도가 커야 한다", "고온 강도가 낮아야 한다", "비중이 매우 커야 한다", "흡습성이 있어야 한다"] },
        { q: "열처리 과정에서 나타나는 조직 중에서 부피의 변화가 가장 큰 것은?", a: "마텐자이트", d: ["오스테나이트", "트루스타이트", "소르바이트", "펄라이트", "페라이트", "시멘타이트"] },
        { q: "화염경화 처리의 특징은?", a: "국부적인 담금질이 가능하다", d: ["표면 침탄이 빠르다", "질화층이 깊다", "심부까지 경화된다", "탈탄이 전혀 없다", "변형이 아예 없다"] },
        { q: "강재의 탈탄 여부를 검사하는 시험은?", a: "강박 시험", d: ["설퍼 프린트", "스파크 시험", "초음파 탐상", "자기 탐상", "강구 압입", "경도 시험"] },
        { q: "상온에서 구리의 결정 격자 형태는?", a: "FCC(면심입방격자)", d: ["BCC(체심입방격자)", "HCP(조밀육방격자)", "단사정계", "정방정계", "사방정계"] },
        { q: "침탄법에서 2차 담금질을 하는 목적은?", a: "표면 침탄층의 경화", d: ["심부 조직의 미세화", "잔류 응력의 제거", "결정립의 성장 방지", "내식성 향상", "인성 부여"] },
        { q: "화학적 열처리 방법에 속하는 것들은?", a: "침탄법, 질화법, 금속 침투법", d: ["풀림, 불림, 담금질", "고주파 경화, 화염 경화", "템퍼링, 노멀라이징", "오스템퍼링, 마템퍼링"] },
        { q: "변태점의 측정 방법에는 어떤 것들이 있는가?", a: "열분석법, 열팽창법, 전기 저항법", d: ["경도법, 인장법, 굴곡법", "비중법, 색깔법, 타격법", "초음파법, 방사선법", "육안검사, 자석검사"] },
        { q: "주강과 주철 중 수축률이 더 큰 것은?", a: "주강", d: ["주철", "두 재료가 같다", "탄소 함유량에 따라 다르다", "냉각 속도에 따라 다르다"] },
        { q: "열처리 가열 노(로)로 사용되는 것은?", a: "전기로, 가스로, 분위기로 등", d: ["압축기, 송풍기", "냉동기, 펌프", "컨베이어, 크레인", "분쇄기, 혼합기"] },
        { q: "강의 표준 조직을 얻기 위한 열처리 방법은?", a: "노멀라이징(불림)", d: ["어닐링(풀림)", "퀜칭(담금질)", "템퍼링(뜨임)", "심랭 처리", "질화 처리"] },
        { q: "순철의 자기 변태점 온도는?", a: "768℃", d: ["210℃", "723℃", "910℃", "1147℃", "1394℃", "1538℃"] },
        { q: "나사의 머리부를 고리 모양으로 만들어 체인 또는 훅 등을 걸 때 사용하는 볼트는?", a: "아이 볼트", d: ["스테이 볼트", "기초 볼트", "나비 볼트", "티 볼트", "유 볼트(U-bolt)"] },
        { q: "원자로용 1차 금속과 고융점 구조 재료는?", a: "우라늄, 토륨", d: ["금, 은", "알루미늄, 마그네슘", "니켈, 크롬", "구리, 아연", "티타늄, 지르코늄"] },
        { q: "열전대의 구비 조건으로 옳은 것은?", a: "히스테리시스의 오차가 없어야 한다", d: ["전기저항이 매우 커야 한다", "열전도율이 커야 한다", "기전력이 작아야 한다", "부식이 잘 되어야 한다", "값이 비싸야 한다"] },
        { q: "탄소강의 조직 중 층상인 조직은?", a: "펄라이트", d: ["마텐자이트", "오스테나이트", "베이나이트", "페라이트", "시멘타이트", "트루스타이트"] },
        { q: "열처리 중 냉각 속도가 가장 늦은 것은?", a: "풀림", d: ["담금질", "뜨임", "불림", "오스템퍼링", "마르퀜칭"] },
        { q: "소량 다품종 부품의 열처리에 적합한 열처리법은?", a: "염욕 열처리", d: ["고주파 열처리", "화염 경화", "진공 열처리", "가스 침탄", "연속 가열"] },

    let currentQuestions = [];
    let userAnswers = {};

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startQuiz() {
        const numInput = parseInt(document.getElementById('num-questions').value);
        const num = isNaN(numInput) ? 10 : Math.min(Math.max(numInput, 1), 100);
        const selected = shuffleArray(rawData).slice(0, num);
        currentQuestions = []; userAnswers = {};
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        selected.forEach((item, index) => {
            const isSAQ = Math.random() < 0.3;
            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';
            let html = `<div class="question-title">Q${index + 1}. ${item.q} <span class="q-type">${isSAQ ? '주관식' : '객관식'}</span></div>`;

            if (isSAQ) {
                currentQuestions.push({ type: 'saq', question: item.q, answer: item.a });
                html += `<input type="text" class="saq-input" oninput="userAnswers[${index}] = this.value" placeholder="답안을 입력하세요">`;
            } else {
                const distractors = shuffleArray(item.d).slice(0, 3);
                const options = shuffleArray([item.a, ...distractors]);
                currentQuestions.push({ type: 'mcq', question: item.q, options, correctIndex: options.indexOf(item.a), answer: item.a });
                html += `<ul class="options-list" id="options-list-${index}">` + options.map((o, oi) => `
                    <li class="option-item" onclick="userAnswers[${index}]=${oi}; document.querySelectorAll('#options-list-${index} .option-item').forEach(e=>e.classList.remove('selected')); this.classList.add('selected');">
                        ${oi + 1}. ${o}
                    </li>`).join('') + `</ul>`;
            }
            qBlock.innerHTML = html;
            container.appendChild(qBlock);
        });

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function normalizeString(str) {
        return str.toLowerCase().replace(/[\s\(\)\+,\.\-%\℃\/\:\·]/g, '');
    }

    function checkAnswerOffline(correct, user) {
        if (!user) return false;
        let c = normalizeString(correct);
        let u = normalizeString(user);
        if (c === u || u.includes(c)) return true;
        for (let group of massiveDictionary) {
            if (group.some(w => c.includes(normalizeString(w)))) {
                if (group.some(w => u.includes(normalizeString(w)))) return true;
            }
        }
        return false;
    }

    function submitQuiz() {
        let correctCount = 0;
        const review = document.getElementById('review-container');
        review.innerHTML = '';

        currentQuestions.forEach((q, i) => {
            const block = document.createElement('div');
            block.className = 'card question-block';
            let isCorrect = (q.type === 'mcq') ? (userAnswers[i] === q.correctIndex) : checkAnswerOffline(q.answer, userAnswers[i]);
            if (isCorrect) correctCount++;

            let resultHtml = `<span class="result-tag ${isCorrect ? 'correct-answer' : 'wrong-answer'}">${isCorrect ? '정답' : '오답'}</span>`;
            resultHtml += `<div class="question-title">Q${i+1}. ${q.question}</div>`;
            
            if (q.type === 'mcq') {
                resultHtml += `<ul class="options-list">` + q.options.map((o, oi) => `
                    <li class="option-item ${oi === q.correctIndex ? 'correct-answer' : (oi === userAnswers[i] ? 'wrong-answer' : '')}">
                        ${oi+1}. ${o}
                    </li>`).join('') + `</ul>`;
            } else {
                resultHtml += `<div class="saq-result ${isCorrect ? 'correct-answer' : 'wrong-answer'}">제출 답안: ${userAnswers[i] || '(미입력)'}<br>정답: ${q.answer}</div>`;
            }
            
            block.innerHTML = resultHtml;
            review.appendChild(block);
        });

        document.getElementById('final-score').innerText = Math.round((correctCount / currentQuestions.length) * 100);
        document.getElementById('correct-q-count').innerText = correctCount;
        document.getElementById('total-q-count').innerText = currentQuestions.length;
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        window.scrollTo(0, 0);
    }
