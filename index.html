<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열처리기능사 기출 모의고사</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border: #cbd5e1;
            --correct-bg: #f0fdf4;
            --correct-border: #22c55e;
            --wrong-bg: #fef2f2;
            --wrong-border: #ef4444;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }
        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        #setup-screen {
            text-align: center;
        }
        .input-group {
            margin: 30px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .input-group input {
            width: 120px;
            padding: 10px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background-color: #f8fafc;
        }

        .question-block {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
        }
        .question-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .question-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
        }
        .q-number {
            font-weight: 600;
        }
        .q-type {
            font-size: 0.8rem;
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            color: #475569;
            margin-left: 5px;
            vertical-align: middle;
        }
        
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
        }
        .option-item:hover {
            background-color: #f8fafc;
        }
        .option-item input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
        }
        .option-item label {
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        .option-item.selected {
            border-color: var(--primary);
            background-color: #f0fdf4;
        }

        .saq-input-wrap {
            margin-top: 10px;
        }
        .saq-input {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
        }
        .saq-input:focus {
            border-color: var(--primary);
        }

        .score-board {
            text-align: center;
            padding: 30px 20px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .score-board h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }
        
        .option-item.correct-answer {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            font-weight: 500;
        }
        .option-item.wrong-answer {
            background-color: var(--wrong-bg);
            border-color: var(--wrong-border);
        }
        .saq-result {
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        .saq-correct {
            background-color: var(--correct-bg);
            border: 1px solid var(--correct-border);
        }
        .saq-wrong {
            background-color: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
        }

        .feedback-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .feedback-correct { color: #166534; }
        .feedback-wrong { color: #991b1b; }

        .hidden { display: none !important; }

        .action-bar {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>열처리기능사 실전 모의고사</h1>
        <p>핵심 요약 100제 CBT</p>
    </header>

    <div id="setup-screen" class="card">
        <div class="input-group">
            <label for="num-questions">출제 문항 수 입력 (최대 100)</label>
            <input type="number" id="num-questions" value="10" min="1" max="100">
        </div>
        <button class="btn" onclick="startQuiz()">응시하기</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="questions-container" class="card"></div>
        <div class="action-bar">
            <button class="btn" onclick="submitQuiz()">제출 및 채점</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="score-board">
            <h2><span id="final-score">0</span>점</h2>
            <p>총 <span id="total-q-count">0</span>문제 중 <span id="correct-q-count">0</span>문제를 맞췄습니다.</p>
        </div>
        <div id="review-container" class="card"></div>
        <div class="action-bar">
            <button class="btn btn-outline" onclick="resetQuiz()">다시 풀기</button>
        </div>
    </div>
</div>

<script>

        { q: "담금질 처리된 제품을 망치 등으로 두드려 소리를 듣는 결함 검사법은?", a: "타진법" },
        { q: "재료가 지니고 있는 질긴 성질을 뜻하는 용어는?", a: "인성" },
        { q: "물체의 보이는 모양을 굵은 실선으로 나타내는 선은?", a: "외형선" },
        { q: "탄소강에서 헤어크랙(백점) 발생에 가장 큰 영향을 주는 원소는?", a: "수소" },
        { q: "기어의 모듈(Module)을 구하는 공식은?", a: "피치원의 지름 ÷ 잇수" },
        { q: "주철의 유동성을 해치는 대표적인 합금 원소는?", a: "황" },
        { q: "열처리할 때 적용하는 냉각 방식의 종류는?", a: "연속 냉각, 2단 냉각, 항온 냉각" },
        { q: "재료의 굵기나 두께에 따라 담금질 효과가 다르게 나타나는 현상은?", a: "질량 효과" },
        { q: "실물의 크기와 같은 크기로 1:1로 표현하는 척도는?", a: "현척" },
        { q: "열처리용 치구(Jig)가 갖추어야 할 일반적인 조건은?", a: "범용성이 있어야 한다" },
        { q: "탄화철(시멘타이트, Fe3C)의 금속 간 화합물에 있어 탄소의 원자비는?", a: "25%" },
        { q: "침탄과 동시에 질화가 진행되는 장점을 가지는 침탄법은?", a: "액체 침탄(청화법)" },
        { q: "질화에 의한 표면 경화 시 주로 사용되는 가스는?", a: "암모니아 가스" },
        { q: "탄소강에서 청열 취성을 일으키는 온도의 범위는?", a: "200~300℃" },
        { q: "담금질 균열을 방지하기 위한 설계적 대책은?", a: "날카로운 모서리 부분에 라운딩 처리" },
        { q: "가스로의 안전장치 종류에는 어떤 것들이 있는가?", a: "압력 스위치, 연소 감시 장치, 상한·하한 온도계 등" },
        { q: "질화 경도의 향상에 가장 효과적인 합금 원소는?", a: "크롬(Cr)" },
        { q: "노멀라이징 냉각 시 적열 상태(화색)가 없어지는 온도는 대략 얼마인가?", a: "550℃" },
        { q: "내식용 알루미늄 합금의 종류는?", a: "알민, 알클래드(Alclad), 하이드로날륨" },
        { q: "공석강을 담금질한 다음 300~400℃로 뜨임할 때 나타나는 조직은?", a: "트루스타이트" }
    ];

    let currentQuestions = [];
    let userAnswers = {};

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getDistractors(correctAnswer) {
        const wrongAnswers = rawData.map(d => d.a).filter(a => a !== correctAnswer);
        return shuffleArray(wrongAnswers).slice(0, 3);
    }

    function normalizeText(text) {
        if (!text) return "";
        return text.toString().replace(/\s+/g, '').toLowerCase();
    }

    function handleOptionSelect(qIndex, optIndex) {
        userAnswers[qIndex] = optIndex;
        document.querySelectorAll(`.options-list[data-qindex="${qIndex}"] .option-item`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`opt-wrapper-${qIndex}-${optIndex}`).classList.add('selected');
    }

    function handleTextInput(qIndex, value) {
        userAnswers[qIndex] = value;
    }

    function startQuiz() {
        const inputNum = parseInt(document.getElementById('num-questions').value);
        let num = isNaN(inputNum) ? 10 : Math.min(Math.max(inputNum, 1), 100);

        const shuffledData = shuffleArray(rawData);
        const selectedData = shuffledData.slice(0, num);
        
        currentQuestions = [];
        userAnswers = {};

        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        selectedData.forEach((item, index) => {
            const isSAQ = Math.random() < 0.3; // 약 30% 확률로 주관식 배치

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';

            let innerHTML = `
                <div class="question-title">
                    <span class="q-number">Q${index + 1}.</span> 
                    <span>${item.q}</span>
                    <span class="q-type">${isSAQ ? '단답형' : '객관식'}</span>
                </div>
            `;

            if (isSAQ) {
                currentQuestions.push({ type: 'saq', question: item.q, answer: item.a });
                innerHTML += `
                    <div class="saq-input-wrap">
                        <input type="text" class="saq-input" placeholder="정답을 입력하세요" oninput="handleTextInput(${index}, this.value)">
                    </div>
                `;
            } else {
                let options = [item.a, ...getDistractors(item.a)];
                options = shuffleArray(options); // 보기 위치 섞기 (매번 호출 시 다르게 배치됨)
                const correctIndex = options.indexOf(item.a);
                
                currentQuestions.push({ type: 'mcq', question: item.q, options: options, correctIndex: correctIndex, answer: item.a });

                let optionsHtml = '';
                options.forEach((opt, oIndex) => {
                    optionsHtml += `
                        <li class="option-item" id="opt-wrapper-${index}-${oIndex}" onclick="document.getElementById('q${index}_o${oIndex}').click()">
                            <input type="radio" name="q${index}" id="q${index}_o${oIndex}" value="${oIndex}" onchange="handleOptionSelect(${index}, ${oIndex})">
                            <label for="q${index}_o${oIndex}">${opt}</label>
                        </li>
                    `;
                });
                innerHTML += `<ul class="options-list" data-qindex="${index}">${optionsHtml}</ul>`;
            }

            qBlock.innerHTML = innerHTML;
            container.appendChild(qBlock);
        });

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function submitQuiz() {
        if (Object.keys(userAnswers).length < currentQuestions.length) {
            if (!confirm('입력하지 않은 문항이 있습니다. 제출하시겠습니까?')) return;
        }

        let correctCount = 0;
        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = '';

        currentQuestions.forEach((qObj, index) => {
            const userAnswer = userAnswers[index];
            let isCorrect = false;

            const rBlock = document.createElement('div');
            rBlock.className = 'question-block';
            
            let reviewHtml = `
                <div class="question-title">
                    <span class="q-number">Q${index + 1}.</span> 
                    <span>${qObj.question}</span>
                </div>
            `;

            if (qObj.type === 'mcq') {
                isCorrect = userAnswer === qObj.correctIndex;
                if (isCorrect) correctCount++;

                let optionsHtml = '';
                qObj.options.forEach((opt, oIndex) => {
                    let statusClass = oIndex === qObj.correctIndex ? 'correct-answer' : (oIndex === userAnswer ? 'wrong-answer' : '');
                    optionsHtml += `
                        <li class="option-item ${statusClass}" style="cursor:default;">
                            <input type="radio" disabled ${oIndex === userAnswer ? 'checked' : ''}>
                            <label>${opt}</label>
                        </li>
                    `;
                });
                reviewHtml += `<ul class="options-list">${optionsHtml}</ul>`;
            } else {
                // 단답형 보정 로직: 띄어쓰기 제거 및 소문자화 후 비교
                const normalizedUser = normalizeText(userAnswer);
                const normalizedAns = normalizeText(qObj.answer);
                
                isCorrect = normalizedUser !== "" && normalizedUser === normalizedAns;
                if (isCorrect) correctCount++;

                const statusClass = isCorrect ? 'saq-correct' : 'saq-wrong';
                reviewHtml += `
                    <div class="saq-result ${statusClass}">
                        <div>작성한 답: <strong>${userAnswer || '(미입력)'}</strong></div>
                        ${!isCorrect ? `<div style="margin-top:5px;">올바른 정답: <strong>${qObj.answer}</strong></div>` : ''}
                    </div>
                `;
            }

            reviewHtml += `<div class="feedback-msg ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                ${isCorrect ? '정답입니다.' : '오답입니다.'}
            </div>`;

            rBlock.innerHTML = reviewHtml;
            reviewContainer.appendChild(rBlock);
        });

        const score = Math.round((correctCount / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-q-count').innerText = currentQuestions.length;
        document.getElementById('correct-q-count').innerText = correctCount;

        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    function resetQuiz() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
